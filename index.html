<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Generator</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #0f0f0f, #050505);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 520px;
      width: 90%;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(255, 0, 80, 0.2);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      margin-bottom: 20px;
      font-size: 30px;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #ff2e63, #00f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    select, button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
    }

    select {
      background: #111;
      color: white;
    }

    button {
      background: linear-gradient(90deg, #ff2e63, #ff4f7a);
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(255, 46, 99, 0.5);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255, 46, 99, 0.9);
    }

    textarea {
      width: 100%;
      height: 170px;
      margin-top: 10px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      resize: none;
      font-size: 15px;
      line-height: 1.6;
      font-family: monospace;
      background: #0d0d0d;
      color: #00f0ff;
      box-shadow: inset 0 0 10px rgba(0,255,255,0.2);
    }

    .copy-msg {
      margin-top: 10px;
      font-size: 14px;
      color: #00ffcc;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .copy-msg.show {
      opacity: 1;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 Prompt Generator</h1>

    <select id="category">
      <option value="cinematic">Cinematic</option>
      <option value="aesthetic">Instagram Aesthetic</option>
      <option value="car">BMW / Car Edit</option>
      <option value="portrait">Portrait</option>
    </select>

    <button onclick="generatePrompt()">Generate Prompt</button>

    <textarea id="output" readonly placeholder="Your prompt will appear here..."></textarea>

    <button onclick="copyPrompt()">Copy</button>

    <div id="copyMsg" class="copy-msg">Copied to clipboard ✅</div>
  </div>

  <script>
    const prompts = {
      cinematic: "Ultra cinematic lighting, dramatic shadows, high contrast, 4K, film grain, moody atmosphere, depth of field, anamorphic lens, cinematic color grading",
      aesthetic: "Soft pastel tones, glowing highlights, Instagram aesthetic, smooth skin, dreamy vibe, warm tones, natural light, minimal shadows",
      car: "BMW sports car, neon city lights, night reflections, cinematic angle, ultra realistic, glossy finish, motion blur, luxury vibe, high detail",
      portrait: "DSLR portrait, sharp focus, natural skin texture, soft lighting, bokeh background, 85mm lens, detailed eyes, high resolution"
    };

    function generatePrompt() {
      const category = document.getElementById("category").value;
      document.getElementById("output").value = prompts[category];
    }

    function copyPrompt() {
      const text = document.getElementById("output").value;
      navigator.clipboard.writeText(text);

      const msg = document.getElementById("copyMsg");
      msg.classList.add("show");

      setTimeout(() => {
        msg.classList.remove("show");
      }, 1500);
    }
  </script>
</body>
</html>
