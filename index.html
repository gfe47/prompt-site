<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Generator</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0f0f0f, #050505);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 520px;
      width: 90%;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(255, 0, 80, 0.2);
    }

    h1 {
      font-size: 28px;
      background: linear-gradient(90deg, #ff2e63, #00f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    select, button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    button {
      background: linear-gradient(90deg, #ff2e63, #ff4f7a);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { transform: scale(1.05); }

    textarea {
      width: 100%;
      height: 140px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #0d0d0d;
      color: #00f0ff;
      font-family: monospace;
    }

    .preview img {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    .loading {
      display: none;
      margin-top: 10px;
    }

    .loading.show { display: block; }

    .actions {
      display: flex;
      gap: 10px;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 Prompt Generator</h1>

    <select id="category">
      <option value="cinematic">Cinematic</option>
      <option value="aesthetic">Aesthetic</option>
      <option value="car">Car</option>
    </select>

    <button onclick="generatePrompt()">Generate</button>

    <div class="loading" id="loading">Loading...</div>

    <textarea id="output" readonly></textarea>

    <div class="preview">
      <img id="previewImg" />
    </div>

    <div class="actions">
      <button onclick="copyPrompt()">Copy</button>
      <button onclick="savePrompt()">Save</button>
      <button onclick="sharePrompt()">Share</button>
    </div>

  </div>

  <script>
    const data = {
      cinematic: [
        {text: "Cinematic lighting, dramatic shadows, film look", img: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"},
        {text: "Hollywood scene, moody lighting", img: "https://images.unsplash.com/photo-1492724441997-5dc865305da7"}
      ],
      aesthetic: [
        {text: "Soft pastel tones, dreamy aesthetic", img: "https://images.unsplash.com/photo-1521334884684-d80222895322"},
        {text: "Clean IG aesthetic, warm tones", img: "https://images.unsplash.com/photo-1501004318641-b39e6451bec6"}
      ],
      car: [
        {text: "BMW neon night scene", img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70"},
        {text: "Luxury car cinematic shot", img: "https://images.unsplash.com/photo-1494976388531-d1058494cdd8"}
      ]
    };

    function generatePrompt() {
      const category = document.getElementById("category").value;
      const list = data[category];

      const loading = document.getElementById("loading");
      loading.classList.add("show");

      setTimeout(() => {
        const item = list[Math.floor(Math.random() * list.length)];
        document.getElementById("output").value = item.text;
        document.getElementById("previewImg").src = item.img;
        loading.classList.remove("show");
      }, 500);
    }

    function copyPrompt() {
      navigator.clipboard.writeText(document.getElementById("output").value);
    }

    function savePrompt() {
      localStorage.setItem("savedPrompt", document.getElementById("output").value);
      alert("Saved!");
    }

    function sharePrompt() {
      const text = document.getElementById("output").value;
      if (navigator.share) {
        navigator.share({text});
      } else {
        alert("Sharing not supported");
      }
    }
  </script>
</body>
</html>
